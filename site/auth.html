<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Авторизация</title>
  <style>
    body {
      background-color: #121212;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    input {
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 5px;
      width: 250px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background-color: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #555;
    }
    #error-message {
      display: none;
      margin-bottom: 10px;
      padding: 10px;
      background-color: rgba(204, 0, 0, 0.7);
      color: white;
      border-radius: 5px;
      width: 250px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Вход в панель управления</h2>
  <input type="text" id="login" placeholder="Логин" autocomplete="username" />
  <input type="password" id="password" placeholder="Пароль" autocomplete="current-password" />
  <div id="error-message">Неверный логин или пароль!</div>
  <button onclick="login()">Войти</button>

  <script>
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const loginVal = document.getElementById("login").value.trim();
      const passwordVal = document.getElementById("password").value;
      const errorMessage = document.getElementById("error-message");

      errorMessage.style.display = 'none';

      if (!loginVal || !passwordVal) {
        errorMessage.textContent = "Введите логин и пароль!";
        errorMessage.style.display = "block";
        return;
      }

      try {
        const res = await fetch("/api/status", {
          headers: {
            "Authorization": "Basic " + btoa(loginVal + ":" + passwordVal)
          }
        });

        if (res.status === 200) {
          localStorage.setItem("auth_login", loginVal);
          localStorage.setItem("auth_password", passwordVal);
          window.location.href = "index.html";
        } else if (res.status === 401) {
          errorMessage.textContent = "Неверный логин или пароль!";
          errorMessage.style.display = "block";
        } else {
          errorMessage.textContent = "Ошибка сервера. Попробуйте позже.";
          errorMessage.style.display = "block";
        }
      } catch (e) {
        errorMessage.textContent = "Не удалось подключиться к серверу.";
        errorMessage.style.display = "block";
      }
    }
  </script>
</body>
</html>
